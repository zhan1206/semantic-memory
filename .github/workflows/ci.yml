name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.11"
            os: macos-latest
          - python-version: "3.11"
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-cov pytest-asyncio flake8 black mypy isort

      - name: Check code format (Black)
        run: |
          black --check . || true

      - name: Check import order (isort)
        run: |
          isort --check-only --diff . || true

      - name: Lint with flake8
        run: |
          flake8 . --count --max-line-length=120 --statistics --exclude=.git,__pycache__,.venv,build,dist || true

      - name: Type check with mypy
        run: |
          mypy semantic_memory tests --ignore-missing-imports || true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=semantic_memory --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint-only:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: pip install flake8 black mypy isort ruff
      - name: Run ruff
        run: ruff check . || true
      - name: Run black
        run: black --check . || true
      - name: Run isort
        run: isort --check-only --diff . || true

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install build
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Check dist contents
        run: |
          $files = Get-ChildItem dist/
          if ($files.Count -eq 0) { exit 1 }
          Write-Host "Built files:"
          $files | ForEach-Object { Write-Host $_.Name }

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, lint-only, build-check]
    if: always()
    steps:
      - name: Summary
        run: |
          Write-Host "## CI Results" -ForegroundColor Green
          Write-Host "All jobs completed. Check individual job status above."
